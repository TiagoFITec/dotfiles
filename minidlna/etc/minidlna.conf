# MiniDLNA / ReadyMedia configuration
# Debian package path: /etc/minidlna.conf

port=8200
network_interface=enp3s0
user=minidlna

# Serve the local video library to DLNA clients.
media_dir=V,/home/tiago/Videos

friendly_name=Giuseppe DLNA Server

# These directories are created by the systemd unit.
db_dir=/var/cache/minidlna
log_dir=/var/log/minidlna

album_art_names=Cover.jpg/cover.jpg/AlbumArtSmall.jpg/albumartsmall.jpg/AlbumArt.jpg/albumart.jpg/Album.jpg/album.jpg/Folder.jpg/folder.jpg/Thumb.jpg/thumb.jpg
inotify=yes
enable_tivo=no
tivo_discovery=bonjour
strict_dlna=no
notify_interval=900
serial=12345678
model_number=1
enable_subtitles=yes